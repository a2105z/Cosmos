<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cosmos — A pure TI-84 graphing calculator. Graphing, statistics, and scientific math in one beautiful interface.">
  <title>Cosmos — Graphing Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Cosmos</h1>
      <nav class="mode-tabs">
        <button class="tab active" data-mode="calc">Calculator</button>
        <button class="tab" data-mode="graph">Graph</button>
        <button class="tab" data-mode="stats">Statistics</button>
      </nav>
      <div class="header-controls">
        <button id="angleMode" class="mode-btn" title="RAD/DEG">RAD</button>
      </div>
    </header>

    <!-- Calculator Mode -->
    <main id="calcMode" class="mode-panel active">
      <div class="display-panel">
        <div id="exprDisplay" class="expr-display"></div>
        <div id="resultDisplay" class="result-display">0</div>
      </div>
      <div class="keypad" id="calcKeypad"></div>
    </main>

    <!-- Graph Mode -->
    <main id="graphMode" class="mode-panel">
      <div class="graph-layout">
        <section class="graph-section">
          <canvas id="graphCanvas"></canvas>
          <div id="traceTooltip" class="trace-tooltip hidden"></div>
          <div id="coordDisplay" class="coord-display"></div>
        </section>
        <aside class="graph-sidebar">
          <h3>Y= Editor</h3>
          <div id="functionList" class="function-list">
            <div class="function-row" data-index="0"><span class="func-label">y₁</span><input type="text" class="func-input" placeholder="x^2" data-index="0"></div>
            <div class="function-row" data-index="1"><span class="func-label">y₂</span><input type="text" class="func-input" placeholder="sin(x)" data-index="1"></div>
            <div class="function-row" data-index="2"><span class="func-label">y₃</span><input type="text" class="func-input" placeholder="" data-index="2"></div>
            <div class="function-row" data-index="3"><span class="func-label">y₄</span><input type="text" class="func-input" placeholder="" data-index="3"></div>
            <div class="function-row" data-index="4"><span class="func-label">y₅</span><input type="text" class="func-input" placeholder="" data-index="4"></div>
            <div class="function-row" data-index="5"><span class="func-label">y₆</span><input type="text" class="func-input" placeholder="" data-index="5"></div>
            <div class="function-row" data-index="6"><span class="func-label">y₇</span><input type="text" class="func-input" placeholder="" data-index="6"></div>
            <div class="function-row" data-index="7"><span class="func-label">y₈</span><input type="text" class="func-input" placeholder="" data-index="7"></div>
            <div class="function-row" data-index="8"><span class="func-label">y₉</span><input type="text" class="func-input" placeholder="" data-index="8"></div>
            <div class="function-row" data-index="9"><span class="func-label">y₁₀</span><input type="text" class="func-input" placeholder="" data-index="9"></div>
          </div>
          <div class="graph-controls">
            <button id="windowBtn" class="btn small">Window</button>
            <button id="zoomFit" class="btn small">Zoom Std</button>
          </div>
        </aside>
      </div>
    </main>

    <!-- Statistics Mode -->
    <main id="statsMode" class="mode-panel">
      <div class="stats-layout">
        <section class="stats-editor">
          <h3>Data Editor</h3>
          <div class="list-editor">
            <div class="list-col">
              <label>L₁</label>
              <textarea id="listL1" placeholder="1, 2, 3, 4, 5" rows="6"></textarea>
            </div>
            <div class="list-col">
              <label>L₂</label>
              <textarea id="listL2" placeholder="2, 4, 6, 8, 10" rows="6"></textarea>
            </div>
          </div>
          <div class="stats-actions">
            <button id="btn1Var" class="btn primary">1-Var Stats</button>
            <button id="btn2Var" class="btn">2-Var Stats</button>
            <button id="btnLinReg" class="btn">LinReg</button>
          </div>
        </section>
        <section class="stats-output">
          <h3>Results</h3>
          <pre id="statsResults" class="stats-results">Enter data and run a calculation.</pre>
        </section>
        <section class="stats-plot">
          <h3>Plot</h3>
          <div class="plot-type">
            <button class="btn small active" data-plot="scatter">Scatter</button>
            <button class="btn small" data-plot="histogram">Histogram</button>
          </div>
          <canvas id="statsCanvas"></canvas>
        </section>
      </div>
    </main>

    <div id="windowModal" class="modal hidden">
      <div class="modal-content">
        <h2>Window Settings</h2>
        <div class="window-inputs">
          <label>Xmin <input type="number" id="xMin" step="any" value="-10"></label>
          <label>Xmax <input type="number" id="xMax" step="any" value="10"></label>
          <label>Ymin <input type="number" id="yMin" step="any" value="-10"></label>
          <label>Ymax <input type="number" id="yMax" step="any" value="10"></label>
        </div>
        <div class="modal-actions">
          <button id="windowApply" class="btn primary">Apply</button>
          <button id="windowClose" class="btn">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
